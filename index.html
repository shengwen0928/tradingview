<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Performance K-Line Engine</title>
    <style>
        body {
            margin: 0;
            background-color: #131722;
            color: #d1d4dc;
            font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', Roboto, Ubuntu, sans-serif;
            overflow: hidden;
        }

        #chart-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #grid-canvas { z-index: 1; }
        #candle-canvas { z-index: 2; }
        #overlay-canvas { z-index: 3; }

        .loading-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="chart-container">
        <!-- 🚨 新增：幣種與週期切換 UI -->
        <div id="controls" style="position: absolute; top: 10px; left: 10px; z-index: 15; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 4px; border: 1px solid #333; display: flex; gap: 10px;">
            <select id="symbol-select" style="background: transparent; color: #d1d4dc; border: none; outline: none; font-size: 14px; cursor: pointer;">
                <option value="BTC-USDT-SWAP">BTC-USDT</option>
                <option value="ETH-USDT-SWAP">ETH-USDT</option>
                <option value="SOL-USDT-SWAP">SOL-USDT</option>
                <option value="DOGE-USDT-SWAP">DOGE-USDT</option>
            </select>
            <div style="width: 1px; background: #333;"></div>
            <select id="timeframe-select" style="background: transparent; color: #d1d4dc; border: none; outline: none; font-size: 14px; cursor: pointer;">
                <option value="1s">1s</option>
                <option value="1m" selected>1m</option>
                <option value="5m">5m</option>
                <option value="15m">15m</option>
                <option value="1h">1h</option>
                <option value="4h">4h</option>
                <option value="1D">1D</option>
                <option value="1W">1W</option>
                <option value="1M">1M</option>
            </select>
        </div>

        <div id="loading" class="loading-overlay">Loading History...</div>
        <div id="status" style="position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; gap: 6px; border: 1px solid #333;">
            <div id="status-dot" style="width: 8px; height: 8px; background: #ef5350; border-radius: 50%; box-shadow: 0 0 5px #ef5350;"></div>
            <span id="status-text">Connecting...</span>
        </div>
        <canvas id="grid-canvas" width="1200" height="800"></canvas>
        <canvas id="candle-canvas" width="1200" height="800"></canvas>
        <canvas id="overlay-canvas" width="1200" height="800"></canvas>
    </div>
    <!-- 引入編譯後的 JS -->
    <script type="module" src="./src/main.ts"></script>
</body>
</html>
