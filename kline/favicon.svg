<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 背景圓角矩形 -->
  <rect width="32" height="32" rx="6" fill="#2962ff"/>
  
  <!-- 蠟燭圖元素 - 第一根 (下跌) -->
  <line x1="10" y1="12" x2="10" y2="24" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="8" y="14" width="4" height="6" fill="#ffffff" rx="0.5"/>
  
  <!-- 蠟燭圖元素 - 第二根 (上漲 - 主視覺) -->
  <line x1="17" y1="8" x2="17" y2="22" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="15" y="10" width="4" height="10" fill="#ffffff" rx="0.5"/>
  
  <!-- 蠟燭圖元素 - 第三根 (上漲) -->
  <line x1="24" y1="14" x2="24" y2="20" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="22" y="16" width="4" height="2" fill="#ffffff" rx="0.5"/>
</svg>