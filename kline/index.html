<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Performance K-Line Engine</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <style>
        body {
            margin: 0;
            background-color: #131722;
            color: #d1d4dc;
            font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', Roboto, Ubuntu, sans-serif;
            overflow: hidden;
        }

        #chart-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #grid-canvas { z-index: 1; }
        #candle-canvas { z-index: 2; }
        #overlay-canvas { z-index: 3; }

        .loading-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="chart-container">
        <!-- 🚀 部署觸發器: 2026-03-31 15:45 -->
        
        <!-- 🚨 新增：側邊繪圖工具列 -->
        <div id="drawing-toolbar" style="position: absolute; top: 60px; left: 10px; z-index: 15; background: rgba(20, 24, 35, 0.8); padding: 6px; border-radius: 6px; border: 1px solid #363c4e; display: flex; flex-direction: column; gap: 8px; backdrop-filter: blur(4px);">
            <button class="tool-btn active" id="tool-cursor" title="游標" style="background: #2a2e39;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg></button>
            <div style="height: 1px; background: #363c4e;"></div>
            <button class="tool-btn" id="tool-trendline" title="趨勢線"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21L21 3"/></svg></button>
            <button class="tool-btn" id="tool-ray" title="射線"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21l18-18M21 3h-4M21 3v4"/></svg></button>
            <button class="tool-btn" id="tool-arrow" title="箭頭"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
            <button class="tool-btn" id="tool-horizontal" title="水平線"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18"/></svg></button>
            <button class="tool-btn" id="tool-vertical" title="垂直線"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18"/></svg></button>
            <button class="tool-btn" id="tool-rect" title="矩形"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/></svg></button>
            <button class="tool-btn" id="tool-fibonacci" title="黃金分割"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18M3 7h18M3 11h18M3 15h18M3 19h18"/></svg></button>
            <button class="tool-btn" id="tool-text" title="文字標籤"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg></button>
            <button class="tool-btn" id="tool-priceRange" title="價格範圍"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3h8M8 21h8M12 3v18M12 7h3M12 12h3M12 17h3"/></svg></button>
            <button class="tool-btn" id="tool-brush" title="畫筆"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/></svg></button>
            <button class="tool-btn" id="tool-parallelChannel" title="平行通道"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 16l18-6M3 10l18-6M3 13l18-6" opacity="0.3"/><path d="M3 16l18-6M3 10l18-6"/></svg></button>
            <button class="tool-btn" id="tool-triangle" title="三角形"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3L2 20h20L12 3z"/></svg></button>
            <button class="tool-btn" id="tool-ellipse" title="橢圓形"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="12" rx="9" ry="5"/></svg></button>
            <div style="height: 1px; background: #363c4e;"></div>
            <button class="tool-btn" id="tool-magnet" title="磁鐵模式 (關閉)" style="color: #787b86;">
                <svg id="magnet-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 4v9a7 7 0 0014 0V4M9 4v9a3 3 0 006 0V4M5 4h4M15 4h4"/>
                </svg>
            </button>
            <button class="tool-btn" id="tool-clear" title="清除所有" style="color: #ef5350;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
        </div>

        <style>
            .tool-btn {
                background: transparent;
                border: none;
                color: #d1d4dc;
                width: 32px;
                height: 32px;
                display: flex;
                justify-content: center;
                align-items: center;
                border-radius: 4px;
                cursor: pointer;
                transition: all 0.2s;
            }
            .tool-btn:hover { background: #2a2e39; color: #fff; }
            .tool-btn.active { background: #2962ff; color: #fff; }
        </style>

        <!-- 🚨 幣種與週期切換 UI (彈窗版) -->
        <div id="controls" style="position: absolute; top: 10px; left: 10px; z-index: 15; background: rgba(20, 24, 35, 0.8); padding: 4px 8px; border-radius: 6px; border: 1px solid #363c4e; display: flex; gap: 8px; align-items: center; backdrop-filter: blur(4px);">
            
            <!-- 主標的按鈕：點擊開啟搜尋彈窗 -->
            <button id="symbol-search-btn" class="menu-btn" style="font-weight: bold; color: #fff; font-size: 14px; min-width: 100px; text-align: left;">
                BTC/USDT ▾
            </button>

            <span style="color: #5d606b; margin: 0 2px;">|</span>
            
            <div id="exchange-display" style="color: #929498; font-size: 12px; padding: 0 4px;">Binance</div>
            
            <div style="width: 1px; height: 20px; background: #363c4e;"></div>

            <!-- 我的最愛快捷區 -->
            <div id="tf-favorites" style="display: flex; gap: 4px;"></div>

            <!-- 主週期按鈕與彈窗 -->
            <div style="position: relative;">
                <button id="tf-main-btn" class="menu-btn">1m ▾</button>
                <div id="tf-popup" class="menu-popup">
                    <div id="tf-list"></div>
                    <div style="height: 1px; background: #363c4e; margin: 4px 0;"></div>
                    <input id="tf-custom-input" type="text" placeholder="自訂 (如 3m)" style="width: 100%; background: #131722; border: 1px solid #363c4e; color: #fff; padding: 6px; border-radius: 4px; font-size: 12px; box-sizing: border-box;">
                </div>
            </div>
        </div>

        <!-- 🚨 專業版 OHLC 顯示 (純文字 Overlay) -->
        <div id="ohlc-info" style="position: absolute; top: 50px; left: 15px; z-index: 10; display: flex; gap: 15px; font-family: 'Trebuchet MS', sans-serif; font-size: 13px; color: #929498; pointer-events: none;">
            <div style="display: flex; gap: 4px;">O<span id="ohlc-o" style="color: #d1d4dc;">--</span></div>
            <div style="display: flex; gap: 4px;">H<span id="ohlc-h" style="color: #d1d4dc;">--</span></div>
            <div style="display: flex; gap: 4px;">L<span id="ohlc-l" style="color: #d1d4dc;">--</span></div>
            <div style="display: flex; gap: 4px;">C<span id="ohlc-c" style="color: #d1d4dc;">--</span></div>
            <div id="ohlc-chg" style="margin-left: 5px;">--</div>
        </div>

        <!-- 🚨 搜尋標的彈窗 (Symbol Search Modal) -->
        <div id="symbol-modal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <input type="text" id="modal-search-input" placeholder="輸入代號或名稱 (如 3105, BTC, NVDA)..." autocomplete="off">
                </div>
                <div class="modal-tabs">
                    <button class="tab-btn active" data-cat="CRYPTO">加密貨幣</button>
                    <button class="tab-btn" data-cat="TW_STOCK">台股</button>
                    <button class="tab-btn" data-cat="US_STOCK">美股</button>
                </div>
                <div id="modal-list" class="symbol-list">
                    <!-- 由 JS 列出所有股票 -->
                </div>
            </div>
        </div>

        <style>
            .modal-overlay {
                display: none;
                position: fixed;
                top: 0; left: 0; width: 100vw; height: 100vh;
                background: rgba(0, 0, 0, 0.7); z-index: 1000;
                justify-content: center; align-items: flex-start;
                padding-top: 100px; backdrop-filter: blur(4px);
            }
            .modal-overlay.show { display: flex; }
            .modal-content {
                background: #1e222d; width: 500px; border-radius: 8px;
                border: 1px solid #363c4e; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
                overflow: hidden;
            }
            .modal-header { padding: 16px; border-bottom: 1px solid #363c4e; }
            .modal-header input {
                width: 100%; background: transparent; border: none;
                outline: none; color: #fff; font-size: 18px;
            }
            .modal-tabs { display: flex; background: #131722; padding: 4px; gap: 4px; }
            .tab-btn {
                flex: 1; background: transparent; border: none; color: #929498;
                padding: 8px; cursor: pointer; border-radius: 4px; font-size: 13px;
            }
            .tab-btn:hover { background: #2a2e39; }
            .tab-btn.active { background: #2962ff; color: #fff; }
            
            .symbol-list { max-height: 400px; overflow-y: auto; padding: 8px 0; }
            .symbol-item {
                display: flex; justify-content: space-between; align-items: center;
                padding: 10px 16px; cursor: pointer; transition: background 0.2s;
                border-bottom: 1px solid #2a2e39;
            }
            .symbol-item:hover { background: #2a2e39; }
            .symbol-item .symbol-name { font-weight: bold; color: #d1d4dc; }
            .symbol-item .symbol-desc { font-size: 12px; color: #787b86; }
            .symbol-item .symbol-exch { font-size: 11px; background: #363c4e; color: #d1d4dc; padding: 2px 6px; border-radius: 3px; }
        </style>

        <style>
            .menu-btn {
                background: transparent;
                border: none;
                color: #d1d4dc;
                font-size: 13px;
                cursor: pointer;
                padding: 4px 8px;
                border-radius: 4px;
                transition: background 0.2s;
            }
            .menu-btn:hover { background: #2a2e39; }
            .menu-btn.active { color: #2962ff; font-weight: bold; }
            .fav-btn {
                background: transparent;
                border: none;
                color: #929498;
                font-size: 13px;
                cursor: pointer;
                padding: 4px 8px;
                border-radius: 4px;
            }
            .fav-btn:hover { background: #2a2e39; color: #fff; }
            .fav-btn.active { color: #2962ff; background: rgba(41, 98, 255, 0.1); }

            .menu-popup {
                display: none;
                position: absolute;
                top: 35px;
                left: 0;
                background: #1e222d;
                border: 1px solid #363c4e;
                border-radius: 6px;
                box-shadow: 0 8px 24px rgba(0,0,0,0.5);
                width: 180px;
                padding: 8px;
                z-index: 100;
            }
            .menu-popup.show { display: block; }

            .tf-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 6px 8px;
                color: #d1d4dc;
                font-size: 13px;
                cursor: pointer;
                border-radius: 4px;
            }
            .tf-item:hover { background: #2a2e39; }
        </style>

        <div id="loading" class="loading-overlay">Loading Market Data...</div>
        <div id="status" style="position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; gap: 6px; border: 1px solid #333;">
            <div id="status-dot" style="width: 8px; height: 8px; background: #ef5350; border-radius: 50%; box-shadow: 0 0 5px #ef5350;"></div>
            <span id="status-text">Connecting...</span>
        </div>
        <canvas id="grid-canvas" width="1200" height="800"></canvas>
        <canvas id="candle-canvas" width="1200" height="800"></canvas>
        <canvas id="overlay-canvas" width="1200" height="800"></canvas>
    </div>
    <!-- 引入編譯後的 JS -->
    <script type="module" src="./src/main.ts"></script>
</body>
</html>
