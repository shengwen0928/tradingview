<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Performance K-Line Engine</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <style>
        body {
            margin: 0;
            background-color: #131722;
            color: #d1d4dc;
            font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', Roboto, Ubuntu, sans-serif;
            overflow: hidden;
        }

        #chart-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #grid-canvas { z-index: 1; }
        #candle-canvas { z-index: 2; }
        #overlay-canvas { z-index: 3; }

        .loading-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="chart-container">
        <!-- 🚀 部署觸發器: 2026-03-31 15:45 -->
        
        <!-- 🚨 新增：側邊繪圖工具列 -->
        <div id="drawing-toolbar" style="position: absolute; top: 60px; left: 10px; z-index: 15; background: rgba(20, 24, 35, 0.8); padding: 6px; border-radius: 6px; border: 1px solid #363c4e; display: flex; flex-direction: column; gap: 8px; backdrop-filter: blur(4px);">
            <button class="tool-btn" id="tool-cursor" title="游標" style="background: #2a2e39;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg></button>
            <div style="height: 1px; background: #363c4e;"></div>
            <button class="tool-btn" id="tool-trendline" title="趨勢線"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21L21 3"/></svg></button>
            <button class="tool-btn" id="tool-horizontal" title="水平線"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18"/></svg></button>
            <button class="tool-btn" id="tool-rect" title="矩形"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/></svg></button>
            <div style="height: 1px; background: #363c4e;"></div>
            <button class="tool-btn" id="tool-clear" title="清除所有" style="color: #ef5350;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
        </div>

        <style>
            .tool-btn {
                background: transparent;
                border: none;
                color: #d1d4dc;
                width: 32px;
                height: 32px;
                display: flex;
                justify-content: center;
                align-items: center;
                border-radius: 4px;
                cursor: pointer;
                transition: all 0.2s;
            }
            .tool-btn:hover { background: #2a2e39; color: #fff; }
            .tool-btn.active { background: #2962ff; color: #fff; }
        </style>

        <!-- 🚨 新增：幣種與週期切換 UI (現代化版本) -->
        <div id="controls" style="position: absolute; top: 10px; left: 10px; z-index: 15; background: rgba(20, 24, 35, 0.8); padding: 4px 8px; border-radius: 6px; border: 1px solid #363c4e; display: flex; gap: 8px; align-items: center; backdrop-filter: blur(4px);">
            
            <!-- 市場類型切換 -->
            <select id="market-type-select" style="background: transparent; color: #2962ff; border: none; outline: none; font-size: 13px; cursor: pointer; font-weight: bold; padding: 4px;">
                <option value="SPOT">SPOT</option>
                <option value="PERP">PERP</option>
                <option value="STOCK">STOCK</option>
            </select>

            <span style="color: #5d606b; margin: 0 2px;">|</span>

            <!-- 標的搜尋輸入框 -->
            <div style="position: relative; display: flex; align-items: center;">
                <input id="symbol-search" type="text" placeholder="Search (e.g. BTC/USDT, NVDA)" 
                    style="background: transparent; color: #fff; border: none; outline: none; font-size: 14px; width: 180px; padding: 4px; font-weight: bold;">
                <span id="search-hint" style="font-size: 10px; color: #5d606b; position: absolute; right: 5px; pointer-events: none;">Enter ↵</span>
            </div>

            <span style="color: #5d606b; margin: 0 4px;">|</span>
            
            <select id="exchange-select" style="background: transparent; color: #d1d4dc; border: none; outline: none; font-size: 13px; cursor: pointer; padding: 4px;">
                <option value="">Auto (Best)</option>
                <option value="Binance">Binance</option>
                <option value="OKX">OKX</option>
                <option value="Yahoo">Yahoo</option>
            </select>
            
            <div style="width: 1px; height: 20px; background: #363c4e;"></div>

            <!-- 我的最愛快捷區 -->
            <div id="tf-favorites" style="display: flex; gap: 4px;"></div>

            <!-- 主週期按鈕與彈窗 -->
            <div style="position: relative;">
                <button id="tf-main-btn" class="menu-btn">1m ▾</button>
                <div id="tf-popup" class="menu-popup">
                    <div id="tf-list"></div>
                    <div style="height: 1px; background: #363c4e; margin: 4px 0;"></div>
                    <input id="tf-custom-input" type="text" placeholder="自訂週期 (如 3m)" style="width: 100%; background: #131722; border: 1px solid #363c4e; color: #fff; padding: 6px; border-radius: 4px; font-size: 12px; box-sizing: border-box;">
                </div>
            </div>
        </div>

        <style>
            .menu-btn {
                background: transparent;
                border: none;
                color: #d1d4dc;
                font-size: 13px;
                cursor: pointer;
                padding: 4px 8px;
                border-radius: 4px;
                transition: background 0.2s;
            }
            .menu-btn:hover { background: #2a2e39; }
            .menu-btn.active { color: #2962ff; font-weight: bold; }
            .fav-btn {
                background: transparent;
                border: none;
                color: #929498;
                font-size: 13px;
                cursor: pointer;
                padding: 4px 8px;
                border-radius: 4px;
            }
            .fav-btn:hover { background: #2a2e39; color: #fff; }
            .fav-btn.active { color: #2962ff; background: rgba(41, 98, 255, 0.1); }

            .menu-popup {
                display: none;
                position: absolute;
                top: 35px;
                left: 0;
                background: #1e222d;
                border: 1px solid #363c4e;
                border-radius: 6px;
                box-shadow: 0 8px 24px rgba(0,0,0,0.5);
                width: 180px;
                padding: 8px;
                z-index: 100;
            }
            .menu-popup.show { display: block; }

            .tf-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 6px 8px;
                color: #d1d4dc;
                font-size: 13px;
                cursor: pointer;
                border-radius: 4px;
            }
            .tf-item:hover { background: #2a2e39; }
            .tf-item .star {
                color: #5d606b;
                transition: color 0.2s;
                font-size: 16px;
            }
            .tf-item .star:hover { color: #f0b90b; }
            .tf-item .star.active { color: #f0b90b; }
        </style>

        <div id="loading" class="loading-overlay">Loading Market Data...</div>
        <div id="status" style="position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; gap: 6px; border: 1px solid #333;">
            <div id="status-dot" style="width: 8px; height: 8px; background: #ef5350; border-radius: 50%; box-shadow: 0 0 5px #ef5350;"></div>
            <span id="status-text">Connecting...</span>
        </div>
        <canvas id="grid-canvas" width="1200" height="800"></canvas>
        <canvas id="candle-canvas" width="1200" height="800"></canvas>
        <canvas id="overlay-canvas" width="1200" height="800"></canvas>
    </div>
    <!-- 引入編譯後的 JS -->
    <script type="module" src="./src/main.ts"></script>
</body>
</html>
