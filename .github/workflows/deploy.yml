name: Build and Deploy Frontend

on:
  push:
    branches:
      - main # 🚨 移除路徑限制，確保任何推送都觸發

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 🚨 明確寫入權限
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: kline/package-lock.json

      - name: Install and Build
        run: |
          cd kline
          npm install
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: kline/dist
          branch: gh-pages
          clean: true
